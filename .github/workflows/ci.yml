name: CI

on:
  pull_request:
  push:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DATABASE_URL: file:/tmp/eduno-ci.db
  AUTH_SECRET: ci-secret-not-for-production

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Initialize CI database
        run: npm run db:push

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t eduno-exam:ci .
