name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "electron/**"
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - ".github/workflows/windows-installer.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DATABASE_URL: file:./prisma/ci-win.db
  AUTH_SECRET: ci-secret-not-for-production

jobs:
  build-win-installer:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Initialize build database
        run: npm run db:push

      - name: Build Windows installer
        run: npm run desktop:dist:win:x64

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eduno-Exam-Windows-Installer
          path: |
            dist-desktop/*.exe
            dist-desktop/*.yml
            dist-desktop/*.blockmap
          if-no-files-found: error
