name: Deploy To EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ec2-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euxo pipefail
            APP_DIR=/var/www/eduno-exam
            REPO_URL=https://github.com/ankitpandey65/edunoOMR.git

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$APP_DIR"
              sudo chown -R "$USER":"$USER" "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout main || git checkout master
            git reset --hard origin/main || git reset --hard origin/master

            chmod +x deploy/ec2/setup-server.sh deploy/ec2/deploy-app.sh deploy/ec2/enable-nginx.sh
            bash deploy/ec2/setup-server.sh

            if [ -n "${{ secrets.EC2_ENV_FILE }}" ]; then
              printf '%s\n' '${{ secrets.EC2_ENV_FILE }}' > .env
            fi

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            bash deploy/ec2/deploy-app.sh
            bash deploy/ec2/enable-nginx.sh
            pm2 status
            curl -fsS -I http://127.0.0.1:3000 | head -n 5
