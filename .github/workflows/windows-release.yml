name: Release Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string
      release_name:
        description: "Release title"
        required: false
        default: "Eduno Exam Windows Installer"
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release variables
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
            $name = "${{ inputs.release_name }}"
            $pre = "${{ inputs.prerelease }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $name = "Eduno Exam $tag"
            $pre = "false"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "prerelease=$pre" >> $env:GITHUB_OUTPUT

      - name: Ensure tag exists (manual run)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $tag = "${{ steps.vars.outputs.tag }}"
          $exists = git tag --list $tag
          if (-not $exists) {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag $tag
            git push origin $tag
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run desktop:dist:win:x64

      - name: Publish GitHub release with installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.name }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          files: |
            dist-desktop/*.exe
            dist-desktop/*.yml
            dist-desktop/*.blockmap
