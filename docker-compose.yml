services:
  eduno-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eduno-exam-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/app/prisma/prod.db
    volumes:
      - eduno_prisma:/app/prisma
      - eduno_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000', (r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  eduno_prisma:
  eduno_uploads:
